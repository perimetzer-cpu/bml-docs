    // ============================================================

    async function callGemini(prompt, systemPrompt = '') {
      const key = window.GEMINI_API_KEY;
      if (!key || key === "PASTE_YOUR_GEMINI_KEY_HERE") {
        throw new Error('לא הוגדר מפתח Gemini. ערוך את הקובץ והכנס מפתח.');
      }
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
      const body = {
        contents: [{ parts: [{ text: (systemPrompt ? systemPrompt + '\n\n' : '') + prompt }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 4000 },
      };
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.text();
        throw new Error('שגיאת Gemini: ' + err.substring(0, 150));
      }
      const data = await res.json();
      return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
    }

    async function callGeminiVision(base64, mimeType, prompt) {
      const key = window.GEMINI_API_KEY;
      if (!key || key === "PASTE_YOUR_GEMINI_KEY_HERE") {
        throw new Error('לא הוגדר מפתח Gemini.');
      }
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
      const body = {
        contents: [{
          parts: [
            { inline_data: { mime_type: mimeType, data: base64 } },
            { text: prompt },
          ],
        }],
        generationConfig: { temperature: 0.2, maxOutputTokens: 1500 },
      };
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.text();
        throw new Error('שגיאת Gemini Vision: ' + err.substring(0, 150));
      }
      const data = await res.json();
      return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
    }

    function Field({ label, hint, children }) {
      return (
        <div className="mb-4">
          <label className="block text-sm font-medium text-slate-700 mb-1.5">{label}</label>
          {children}
          {hint && <p className="text-xs text-slate-500 mt-1">{hint}</p>}
        </div>
      );
    }
    function Input({ value, onChange, placeholder }) {
      return <input type="text" value={value || ''} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} dir="rtl" className="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-slate-800 text-right text-sm" />;
    }
    function Textarea({ value, onChange, placeholder, rows = 3 }) {
      return <textarea value={value || ''} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} rows={rows} dir="rtl" className="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-slate-800 text-right text-sm resize-y" />;
    }
    function Select({ value, onChange, options }) {
      return (
        <select value={value || ''} onChange={(e) => onChange(e.target.value)} dir="rtl" className="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-slate-800 text-right text-sm bg-white">
          <option value="">— בחר —</option>
          {options.map((o) => <option key={o} value={o}>{o}</option>)}
        </select>
      );
    }

    // ============================================================
    // PASSWORD GATE
    // ============================================================
    function PasswordGate({ children }) {
      const [authed, setAuthed] = useState(false);
      const [pw, setPw] = useState('');
      const [err, setErr] = useState(false);
      useEffect(() => { if (sessionStorage.getItem('bml-auth') === 'ok') setAuthed(true); }, []);
      const submit = (e) => {
        e.preventDefault();
        if (pw === window.APP_PASSWORD) { sessionStorage.setItem('bml-auth', 'ok'); setAuthed(true); }
        else { setErr(true); setPw(''); }
      };
      if (authed) return children;
      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center p-4">
          <form onSubmit={submit} className="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full">
            <div className="w-14 h-14 mx-auto mb-5 bg-gradient-to-br from-slate-700 to-slate-900 rounded-xl flex items-center justify-center text-white text-2xl">🛡️</div>
            <h1 className="text-2xl font-bold text-slate-900 text-center mb-2">BML Docs</h1>
            <p className="text-sm text-slate-500 text-center mb-6">כניסה לכלי מסמכים משפטיים</p>
            <input type="password" value={pw} onChange={(e) => { setPw(e.target.value); setErr(false); }} placeholder="סיסמא" autoFocus className={'w-full px-3 py-2.5 border rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-800 text-right ' + (err ? 'border-red-400 bg-red-50' : 'border-slate-300')} />
            {err && <p className="text-xs text-red-600 mt-2 text-right">סיסמא שגויה</p>}
            <button type="submit" className="w-full mt-4 py-2.5 bg-slate-900 hover:bg-slate-700 text-white font-medium rounded-lg">כניסה</button>
          </form>
        </div>
      );
    }

    // ============================================================
    // TRAFFIC REPORT EXTRACTOR
    // ============================================================
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result.split(',')[1]);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }

    function ReportExtractor({ onExtract }) {
      const [phase, setPhase] = useState('idle');
      const [err, setErr] = useState('');
      const [fname, setFname] = useState('');
      const inputRef = useRef(null);

      const handle = async (file) => {
        if (!file) return;
        const isPdf = /\.pdf$/i.test(file.name);
        const isImg = /\.(jpe?g|png|webp)$/i.test(file.name);
        if (!isPdf && !isImg) { setErr('PDF, JPG או PNG בלבד'); setPhase('error'); return; }
        setFname(file.name); setPhase('analyzing'); setErr('');
        try {
          const b64 = await fileToBase64(file);
          const mime = isPdf ? 'application/pdf' : (file.type || 'image/jpeg');
          const prompt = 'זהו צילום/PDF של הודעת קנס תנועה ישראלית. חלץ JSON בלבד: {"reportNumber":"מספר הדוח","offenseDate":"DD/MM/YYYY","offenseType":"תיאור העבירה","driverName":"שם הנהג","driverId":"ת.ז","vehicleNumber":"מספר רכב"}. שדה חסר = "". ללא markdown.';
          const txt = await callGeminiVision(b64, mime, prompt);
          const clean = txt.replace(/```json|```/g, '').trim();
          const m = clean.match(/\{[\s\S]*\}/);
          const data = JSON.parse(m ? m[0] : clean);
          onExtract(data);
          setPhase('success');
        } catch (e) { setErr(e.message); setPhase('error'); }
      };

      return (
        <section className="bg-gradient-to-br from-blue-50 to-white border border-blue-200 rounded-lg p-5">
          <div onClick={() => phase !== 'analyzing' && inputRef.current?.click()}
               onDragOver={(e) => e.preventDefault()}
               onDrop={(e) => { e.preventDefault(); handle(e.dataTransfer.files?.[0]); }}
               className="cursor-pointer flex items-center gap-4">
            <div className="w-12 h-12 rounded-lg bg-gradient-to-br from-blue-700 to-slate-900 flex items-center justify-center text-white text-xl shrink-0">
              {phase === 'analyzing' ? '⏳' : phase === 'success' ? '✓' : phase === 'error' ? '⚠️' : '✨'}
            </div>
            <div className="flex-1">
              {phase === 'idle' && <><div className="font-semibold text-slate-900">שאיבה אוטומטית מהדוח (AI)</div><p className="text-sm text-slate-600">גרור צילום או PDF של הודעת הקנס — הנתונים ימולאו אוטומטית</p></>}
              {phase === 'analyzing' && <><div className="font-semibold text-slate-900">מנתח...</div><p className="text-sm text-slate-600">{fname}</p></>}
              {phase === 'success' && <><div className="font-semibold text-emerald-700">הנתונים נשאבו! סקור למטה</div><p className="text-sm text-slate-600">לחץ לשאיבה מקובץ אחר</p></>}
              {phase === 'error' && <><div className="font-semibold text-red-700">שגיאה</div><p className="text-sm text-slate-600">{err}</p></>}
            </div>
          </div>
          <input ref={inputRef} type="file" accept=".pdf,.jpg,.jpeg,.png,.webp" className="hidden" onChange={(e) => handle(e.target.files?.[0])} />
        </section>
      );
    }

    // ============================================================
    // FORMS
    // ============================================================
    function TrialRequestForm({ data, setData }) {
      const today = new Date().toLocaleDateString('he-IL');
      const onExtract = (ex) => {
        const u = { ...data };
        ['reportNumber','offenseDate','offenseType','driverName','driverId','vehicleNumber'].forEach((f) => { if (ex[f]?.trim()) u[f] = ex[f]; });
        setData(u);
      };
      return (
        <div className="space-y-6">
          <ReportExtractor onExtract={onExtract} />
          <section className="bg-white border border-slate-200 rounded-lg p-5">
            <h3 className="font-semibold text-slate-900 mb-4 pb-2 border-b border-slate-100">תאריך המכתב</h3>
            <Field label="תאריך" hint="ברירת מחדל: היום"><Input value={data.letterDate || today} onChange={(v) => setData({ ...data, letterDate: v })} /></Field>
          </section>
          <section className="bg-white border border-slate-200 rounded-lg p-5">
            <h3 className="font-semibold text-slate-900 mb-4 pb-2 border-b border-slate-100">פרטי הלקוח (החותם)</h3>
            <div className="grid md:grid-cols-2 gap-4">
              <Field label="שם מלא"><Input value={data.driverName} onChange={(v) => setData({ ...data, driverName: v })} placeholder="ישראל ישראלי" /></Field>
              <Field label="תעודת זהות"><Input value={data.driverId} onChange={(v) => setData({ ...data, driverId: v })} placeholder="000000000" /></Field>
            </div>
          </section>
          <section className="bg-white border border-slate-200 rounded-lg p-5">
            <h3 className="font-semibold text-slate-900 mb-4 pb-2 border-b border-slate-100">פרטי הדוח</h3>
            <div className="grid md:grid-cols-2 gap-4">
              <Field label="מספר הדוח"><Input value={data.reportNumber} onChange={(v) => setData({ ...data, reportNumber: v })} placeholder="12345678" /></Field>
              <Field label="תאריך העבירה"><Input value={data.offenseDate} onChange={(v) => setData({ ...data, offenseDate: v })} placeholder="01/01/2025" /></Field>
              <Field label="סוג העבירה"><Input value={data.offenseType} onChange={(v) => setData({ ...data, offenseType: v })} placeholder="מהירות מופרזת" /></Field>
            </div>
          </section>
        </div>
      );
    }

    function PoaForm({ data, setData }) {
      return (
        <div className="space-y-6">
          <section className="bg-white border border-slate-200 rounded-lg p-5">
            <h3 className="font-semibold text-slate-900 mb-4 pb-2 border-b border-slate-100">פרטי הלקוח</h3>
            <div className="grid md:grid-cols-2 gap-4">
              <Field label="שם מלא"><Input value={data.clientName} onChange={(v) => setData({ ...data, clientName: v })} placeholder="ישראל ישראלי" /></Field>
              <Field label="תעודת זהות"><Input value={data.clientId} onChange={(v) => setData({ ...data, clientId: v })} placeholder="000000000" /></Field>
            </div>
          </section>
          <section className="bg-white border border-slate-200 rounded-lg p-5">
            <h3 className="font-semibold text-slate-900 mb-4 pb-2 border-b border-slate-100">עו"ד מאמת</h3>
            <Field label='עו"ד שמאמת את החתימה'><Select value={data.signingLawyer} onChange={(v) => setData({ ...data, signingLawyer: v })} options={BML_LAWYERS_SIGN} /></Field>
          </section>
        </div>
      );
    }

    function DemandLetterForm({ data, setData }) {
      const [loading, setLoading] = useState({});
      const updateSec = (i, v) => { const s = [...(data.sections || [])]; s[i] = v; setData({ ...data, sections: s }); };
      const aiExpand = async (i) => {
        const raw = data.sections[i];
        if (!raw?.trim()) { alert('רשום נקודות'); return; }
        setLoading({ ...loading, [i]: true });
        try {
          const r = await callGemini('הקשר: כתב דרישה בנושא "' + (data.subject || '') + '". הרחב לפסקה משפטית אחת רהוטה, לשון זכר נסתר, 2-4 משפטים. ללא מספור, ללא markdown:\n' + raw, LEGAL_SYSTEM);
          updateSec(i, r);
        } catch (e) { alert(e.message); }
        setLoading({ ...loading, [i]: false });
      };
      return (
        <div className="space-y-6">
          <section className="bg-white border border-slate-200 rounded-lg p-5">
            <h3 className="font-semibold text-slate-900 mb-4 pb-2 border-b border-slate-100">פרטי הנמען והתיק</h3>
            <div className="grid md:grid-cols-2 gap-4">
              <Field label="שם הנמען"><Input value={data.recipientName} onChange={(v) => setData({ ...data, recipientName: v })} /></Field>
              <Field label="כתובת"><Input value={data.recipientAddress} onChange={(v) => setData({ ...data, recipientAddress: v })} /></Field>
              <Field label="שם המרשה"><Input value={data.clientName} onChange={(v) => setData({ ...data, clientName: v })} /></Field>
              <Field label="נושא"><Input value={data.subject} onChange={(v) => setData({ ...data, subject: v })} /></Field>
            </div>
            <Field label='עו"ד חותם'><Select value={data.signingLawyer} onChange={(v) => setData({ ...data, signingLawyer: v })} options={BML_LAWYERS_SIGN} /></Field>
          </section>
          <section className="bg-white border border-slate-200 rounded-lg p-5">
            <div className="flex items-center justify-between mb-4 pb-2 border-b border-slate-100">
              <h3 className="font-semibold text-slate-900">סעיפי המכתב</h3>
              <button onClick={() => setData({ ...data, sections: [...(data.sections || []), ''] })} className="text-xs font-medium text-slate-700">+ הוסף סעיף</button>
            </div>
            {(data.sections || []).map((s, i) => (
              <div key={i} className="mb-4">
                <div className="flex items-center justify-between mb-1.5">
                  <span className="text-sm font-medium text-slate-700">סעיף {i + 1}</span>
                  <button onClick={() => aiExpand(i)} className="text-xs px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded">{loading[i] ? '...' : '✨ הרחב'}</button>
                </div>
                <Textarea value={s} onChange={(v) => updateSec(i, v)} placeholder="נקודות או פסקה" />
              </div>
            ))}
          </section>
          <section className="bg-white border border-slate-200 rounded-lg p-5">
            <Field label="תוכן הדרישה"><Textarea value={data.demand} onChange={(v) => setData({ ...data, demand: v })} rows={2} /></Field>
            <Field label="מועד תגובה"><Input value={data.deadline} onChange={(v) => setData({ ...data, deadline: v })} placeholder="14 ימים" /></Field>
          </section>
        </div>
      );
    }

    function CourtMotionForm({ data, setData }) {
      const [loading, setLoading] = useState({});
      const updateParty = (i, k, v) => { const p = [...(data.parties || [])]; p[i] = { ...p[i], [k]: v }; setData({ ...data, parties: p }); };
      const updateSec = (i, v) => { const s = [...(data.sections || [])]; s[i] = v; setData({ ...data, sections: s }); };
      const aiExpand = async (i) => {
        const raw = data.sections[i];
        if (!raw?.trim()) { alert('רשום נקודות'); return; }
        setLoading({ ...loading, [i]: true });
        try {
          const r = await callGemini('הקשר: ' + (data.motionTitle || 'בקשה לבית משפט') + '. הרחב לפסקה משפטית אחת רהוטה, לשון זכר נסתר. ללא מספור, ללא markdown:\n' + raw, LEGAL_SYSTEM);
          updateSec(i, r);
        } catch (e) { alert(e.message); }
        setLoading({ ...loading, [i]: false });
      };
      return (
        <div className="space-y-6">
          <section className="bg-white border border-slate-200 rounded-lg p-5">
            <h3 className="font-semibold text-slate-900 mb-4 pb-2 border-b border-slate-100">פרטי הערכאה</h3>
            <div className="grid md:grid-cols-2 gap-4">
              <Field label="בית המשפט"><Input value={data.court} onChange={(v) => setData({ ...data, court: v })} placeholder="בית משפט השלום בתל אביב" /></Field>
              <Field label="מספר תיק"><Input value={data.caseNumber} onChange={(v) => setData({ ...data, caseNumber: v })} placeholder="12345-01-25" /></Field>
              <Field label="כב' השופט"><Input value={data.judge} onChange={(v) => setData({ ...data, judge: v })} /></Field>
            </div>
          </section>
          <section className="bg-white border border-slate-200 rounded-lg p-5">
            <div className="flex items-center justify-between mb-4 pb-2 border-b border-slate-100">
              <h3 className="font-semibold text-slate-900">צדדים</h3>
              <button onClick={() => setData({ ...data, parties: [...(data.parties || []), { role: '', name: '' }] })} className="text-xs font-medium text-slate-700">+ הוסף צד</button>
            </div>
            {(data.parties || []).map((p, i) => (
              <div key={i} className="grid grid-cols-2 gap-2 mb-2">
                <Input value={p.role} onChange={(v) => updateParty(i, 'role', v)} placeholder="התובע / הנתבע" />
                <Input value={p.name} onChange={(v) => updateParty(i, 'name', v)} placeholder="שם מלא, ת.ז" />
              </div>
            ))}
          </section>
          <section className="bg-white border border-slate-200 rounded-lg p-5">
            <Field label="כותרת הבקשה"><Input value={data.motionTitle} onChange={(v) => setData({ ...data, motionTitle: v })} placeholder="בקשה למתן ארכה" /></Field>
            <Field label='עו"ד חותם'><Select value={data.signingLawyer} onChange={(v) => setData({ ...data, signingLawyer: v })} options={BML_LAWYERS_SIGN} /></Field>
            <Field label="פסקת פתיחה"><Textarea value={data.opening} onChange={(v) => setData({ ...data, opening: v })} /></Field>
          </section>
          <section className="bg-white border border-slate-200 rounded-lg p-5">
            <div className="flex items-center justify-between mb-4 pb-2 border-b border-slate-100">
              <h3 className="font-semibold text-slate-900">סעיפים</h3>
              <button onClick={() => setData({ ...data, sections: [...(data.sections || []), ''] })} className="text-xs font-medium text-slate-700">+ הוסף סעיף</button>
            </div>
            {(data.sections || []).map((s, i) => (
              <div key={i} className="mb-4">
                <div className="flex items-center justify-between mb-1.5">
                  <span className="text-sm font-medium text-slate-700">סעיף {i + 1}</span>
                  <button onClick={() => aiExpand(i)} className="text-xs px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded">{loading[i] ? '...' : '✨ הרחב'}</button>
                </div>
                <Textarea value={s} onChange={(v) => updateSec(i, v)} placeholder="נקודות או פסקה" />
              </div>
            ))}
          </section>
        </div>
      );
    }

    // ============================================================
    // MAIN APP
    // ============================================================
    function App() {
      const [docType, setDocType] = useState(null);
      const [data, setData] = useState({});
      const [downloading, setDownloading] = useState(null);

      const reset = () => { setDocType(null); setData({}); };

      const download = async (fmt) => {
        setDownloading(fmt);
        try {
          let blob, name;
          if (docType === 'court_motion') { blob = await generateCourtMotionDocx(data); name = (data.motionTitle || 'בקשה') + '.docx'; }
          else if (docType === 'trial_request_traffic') { blob = await generateTrialRequestDocx(data); name = 'בקשה להישפט - ' + (data.driverName || '') + '.docx'; }
          else if (docType === 'demand_letter') { blob = await generateDemandLetterDocx(data); name = 'כתב דרישה.docx'; }
          else if (docType === 'power_of_attorney') { blob = await generatePoaDocx(data); name = 'ייפוי כוח - ' + (data.clientName || '') + '.docx'; }

          if (fmt === 'docx') {
            window.saveAs(blob, name);
          } else {
            alert('הורדת PDF: השתמש בכפתור Word ואז שמור כ-PDF מתוך Word, או הדפס מהדפדפן (Ctrl+P).');
          }
        } catch (e) { alert('שגיאה: ' + e.message); }
        setDownloading(null);
      };

      if (!docType) {
        return (
          <div className="min-h-screen bg-slate-50 py-12 px-4">
            <div className="max-w-4xl mx-auto">
              <div className="text-center mb-10">
                <h1 className="text-3xl font-bold text-slate-900 mb-2">כלי יצירת מסמכים משפטיים</h1>
                <p className="text-slate-500">BML Law — בחר סוג מסמך</p>
              </div>
              <div className="grid md:grid-cols-2 gap-4">
                {DOC_TYPES.map((t) => (
                  <button key={t.id} onClick={() => setDocType(t.id)} className="bg-white border border-slate-200 rounded-xl p-6 text-right hover:border-slate-900 hover:shadow-lg transition-all">
                    <h3 className="text-lg font-semibold text-slate-900 mb-1">{t.title}</h3>
                    <p className="text-sm text-slate-500">{t.subtitle}</p>
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      }

      const meta = DOC_TYPES.find((t) => t.id === docType);
      return (
        <div className="min-h-screen bg-slate-50 pb-28">
          <header className="bg-white border-b border-slate-200 sticky top-0 z-10">
            <div className="max-w-4xl mx-auto px-4 py-4 flex items-center gap-3">
              <button onClick={reset} className="text-slate-400 hover:text-slate-900 text-xl">→</button>
              <div>
                <div className="font-semibold text-slate-900 text-sm">{meta.title}</div>
                <div className="text-xs text-slate-500">BML Law</div>
              </div>
            </div>
          </header>
          <main className="max-w-4xl mx-auto px-4 py-6">
            {docType === 'court_motion' && <CourtMotionForm data={data} setData={setData} />}
            {docType === 'trial_request_traffic' && <TrialRequestForm data={data} setData={setData} />}
            {docType === 'demand_letter' && <DemandLetterForm data={data} setData={setData} />}
            {docType === 'power_of_attorney' && <PoaForm data={data} setData={setData} />}
          </main>
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-lg">
            <div className="max-w-4xl mx-auto px-4 py-3 flex items-center justify-end gap-2">
              <button onClick={() => download('docx')} disabled={downloading} className="inline-flex items-center gap-2 px-5 py-2.5 text-sm font-semibold text-white bg-blue-700 hover:bg-blue-800 rounded-lg disabled:opacity-50">
                {downloading === 'docx' ? '⏳' : '📄'} הורד Word
              </button>
              <button onClick={() => download('pdf')} disabled={downloading} className="inline-flex items-center gap-2 px-5 py-2.5 text-sm font-semibold text-white bg-red-700 hover:bg-red-800 rounded-lg disabled:opacity-50">
                📕 הורד PDF
              </button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <PasswordGate><App /></PasswordGate>
    );
  </script>
</body>
</html>
